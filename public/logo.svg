<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 316 100" width="316" height="100" fill="none">
  <!-- Outer rectangular border with flat left corners and rounded bottom-right -->
  <rect x="2" y="2" width="310" height="68" rx="6" ry="6"
    stroke="currentColor" stroke-width="3" fill="none"/>

  <!-- Two horizontal rule lines through the HIGHLIGHT text -->
  <line x1="0" y1="24" x2="316" y2="24" stroke="currentColor" stroke-width="2"/>
  <line x1="0" y1="50" x2="316" y2="50" stroke="currentColor" stroke-width="2"/>

  <!-- HIGHLIGHT text -->
  <text
    x="158"
    y="48"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="700"
    letter-spacing="2"
    text-anchor="middle"
    fill="currentColor"
  >HIGHLIGHT</text>

  <!-- Marketing Management text below the box -->
  <text
    x="158"
    y="90"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    letter-spacing="5"
    text-anchor="middle"
    fill="currentColor"
  >Marketing Management</text>
</svg>
